exclude: ^(\.tmp/|\.vscode/|archive/|data/|docs/|examples/|out/|savetest/|scripts/|tools/|src/menipy/gui/resources/icons/|src/menipy/gui/dialogs/.*\.ui$|[^/]+\.md$|menipy_.*\.html$|\.gitignore$|pendant_baseline\.py$|sessile_baseline\.py$)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: isort (python)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - numpy
          - pydantic
          - pint
          - pydantic-numpy
          - pydantic-pint
        args: ["src/menipy/models", "--config-file=pyproject.toml"]
        pass_filenames: false
        files: ^src/menipy/models/
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ["--convention=numpy", "--add-ignore=D104,D105"]
        # Keep docstyle advisory for newly cleaned modules instead of blocking on
        # inherited repository-wide docstring debt.
        files: ^$
